<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="icon" href="./src/assets/favicon-32x32.png">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <header>
        <div><img src="./src/assets/logo.png" alt="logo" style="max-width: 40px;"></div>
        <nav>
            <a href="./index.html">Home</a>
            <a href="./curriculo.html">Currículo</a>
            <a href="./github.html">Github</a>
            <a href="./servicos.html">Serviços</a>
            <span><a href="./contato.html">Contato</a></span>
        </nav>
    </header>
    <hr style="margin: 0; border-color: gray;">
    <br><br><br>
    <section>
        <table style="width: 420px;" id="contato"><tr><td>
            <div style="white-space: nowrap;">
                <h1>Entre em contato comigo:</h1>
                <br><br>
                <p style="color: red">* Campo obrigatório</p>
            </div>
            <form action="https://formspree.io/f/xvzvegnl" method="post">
                <div>
                    <label for="nome">Nome completo:<span>*</span> </label>
                    <input type="text" id="nome" name="nome" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ]+(\s[A-Za-zÀ-ÖØ-öø-ÿ]+)+$" placeholder="Nome Sobrenome" autocomplete="name" required>
                </div>
                <br>
                <div>
                    <label for="email">E-mail:<span>*</span> </label>
                    <input type="email" id="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" placeholder="email@email.com" autocomplete="email" required>
                </div>
                <br>
                <div>
                    <label for="telefone">Telefone:<span>*</span> </label>
                    <input type="text" id="telefone" name="telefone" pattern="^(\+55\s?)?(\(?\d{2}\)?)\s?(9?\d{4}-?\d{4})$" placeholder="12 91234 1234" autocomplete="tel" required>
                </div>
                <br>
                <label for="modalidade">Pessoa:<span>*</span>  </label>
                <input type="radio" id="pessoa" name="pessoa" value="física" required>Física
                <input type="radio" id="pessoa" name="pessoa" value="jurídica" required>Jurídica
                <br><br>
                <label for="horario">Melhor horário de contato:<span>*</span> </label>
                <input type="time" id="horário" name="horário" required>
                <br><br>
                <label for="serviço">Tipo de serviço:<span>*</span> </label>
                <select name="serviço" id="serviço" name="serviço" required>
                    <optgroup label="Projeto">
                        <option value="elétrico">Elétrico</option>
                        <option value="cabeamento">Cabeamento</option>
                        <option value="segurança">Segurança</option>
                        <option value="solar">Solar</option>
                    </optgroup>
                    <optgroup label="Homepage">
                        <option value="estática">Estática</option>
                        <option value="dinâmica">Dinâmica</option>
                        <option value="avançada">Avançada</option>
                    </optgroup>
                </select>
                <br><br>
                <label for="descrição">Descreva um pouco o serviço desejado:<span>*</span> </label>
                <br><div style="margin-bottom: 8px;"></div>
                <textarea name="descrição" id="descrição" cols="55" rows="8" style="resize: none;"></textarea>
                <br><br><br>
                <div style="display: flex;">
                    <input type="submit" value="Enviar e-mail">
                    <input type="reset" value="Limpar">
                </div>
            </form>
        </td></tr></table>
    </section>
</body>
</html>
