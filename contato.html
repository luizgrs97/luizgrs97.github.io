<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="icon" href="./src/assets/favicon-32x32.png">
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>
    <header>
        <img src="./src/assets/logo.png" alt="logo" class="logo">
        <nav>
            <a href="./index.html">Home</a>
            <a href="./curriculo.html">Currículo</a>
            <a href="./servicos.html">Serviços</a>
            <span><a href="./contato.html">Contato</a></span>
        </nav>
        <a href="https://github.com/luizgrs97" rel="external" target="_blank"><img src="./src/assets/github.png" alt="Github logo" class="git"></a>
    </header>
    <hr style="margin: 0; border-color: gray;">
    <video autoplay muted loop id="bg-video">
        <source src="./src/assets/night.mp4" type="video/mp4">
    </video>
    <section>
        <table style="width: 100%;" id="contato"><tr><td>
            <div>
                <div style="height: 37px;">
                    <h1>Entre em contato comigo:</h1>
                </div>
                <h1></h1>
                <br><br>
                <p style="color: red; text-indent: 0;">* Campo obrigatório</p>
            </div>
            <form action="https://api.web3forms.com/submit" method="post">
                <input type="hidden" name="access_key" value="fd413807-fe80-4346-bf9f-a5174ba83e88">
                <div>
                    <label for="nome">Nome completo:<span>*</span> </label>
                    <input type="text" id="nome" name="nome" maxlength="50" pattern="^[A-Za-zÀ-ÖØ-öø-ÿ]+(\s[A-Za-zÀ-ÖØ-öø-ÿ]+)+$" placeholder="Nome Sobrenome" autocomplete="name" required>
                </div>
                <br>
                <div>
                    <label for="email">E-mail:<span>*</span> </label>
                    <input type="email" id="email" name="email" maxlength="50" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" placeholder="email@email.com" autocomplete="email" required>
                </div>
                <br>
                <div>
                    <label for="telefone">Telefone:<span>*</span> </label>
                    <input type="text" id="telefone" name="telefone" maxlength="20" pattern="^(\+55\s?)?(\(?\d{1,3}\)?)\s?9?\s?\d{4}([-\s])\d{4}$" placeholder="11 98888 7777" autocomplete="tel" required>
                </div>
                <br>
                <label for="modalidade">Pessoa:<span>*</span>  </label>
                <input type="radio" id="pessoa" name="pessoa" value="física" required>Física
                <input type="radio" id="pessoa" name="pessoa" value="jurídica" required>Jurídica
                <br><br>
                <div>
                    <label for="horario">Melhor horário de contato:<span>*</span> </label>
                    <input type="time" id="horário" name="horário" required>
                </div>
                <br>
                <label for="serviço">Tipo de serviço:<span>*</span> </label>
                <select name="serviço" id="serviço" name="serviço" required>
                    <optgroup label="Projeto">
                        <option value="elétrico">Elétrico</option>
                        <option value="cabeamento">Cabeamento</option>
                        <option value="segurança">Segurança</option>
                        <option value="solar">Solar</option>
                    </optgroup>
                    <optgroup label="Homepage">
                        <option value="estática">Estática</option>
                        <option value="dinâmica">Dinâmica</option>
                        <option value="avançada">Avançada</option>
                    </optgroup>
                </select>
                <br><br>
                <label for="descrição">Dê uma breve descrição do serviço:<span>*</span> </label>
                <br><div style="margin-bottom: 8px;"></div>
                <textarea name="descrição" id="descrição" maxlength="384" rows="8" style="resize: none; border: 2px inset gray;"></textarea>
                <br><br><br>
                <div style="gap: 24px; justify-content: center;">
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpar">
                </div>
            </form>
        </td></tr></table>
    </section>
    <hr style="margin: 0; border-color: gray;">
    <footer>
        <p style="text-align: center;"><span id="ano"></span> - LG Ribeiro</p>
    </footer>
    <script src="/src/script.js"></script>
</body>
</html>
